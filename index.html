<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Have a Good Day!</title>
    <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600&display=swap)" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            transition: background 1s ease;
        }

        /* Time-based backgrounds */
        .morning {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        }

        .forenoon {
            background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 50%, #89CFF0 100%);
        }

        .afternoon {
            background: linear-gradient(135deg, #f5af19 0%, #f12711 50%, #ff6b6b 100%);
        }

        .evening {
            background: linear-gradient(135deg, #e65c00 0%, #F9D423 30%, #ff7e5f 70%, #feb47b 100%);
        }

        .night {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
        }

        /* Season overlays */
        .summer {
            background-blend-mode: overlay;
        }

        .winter {
            filter: brightness(0.95) saturate(0.9);
        }

        .monsoon {
            filter: brightness(0.85) contrast(1.1);
        }

        /* Animation canvas */
        #animation-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Main content */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px;
            max-width: 700px;
            animation: fadeInUp 1.2s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .greeting-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15),
                        0 0 0 1px rgba(255, 255, 255, 0.2) inset;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .time-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .greeting {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 15px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
        }

        .time-label {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
        }

        .divider {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.7), transparent);
            margin: 25px auto;
            border-radius: 2px;
        }

        .message {
            font-size: 1.35rem;
            line-height: 1.8;
            color: #fff;
            font-weight: 500;
            margin-bottom: 20px;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.15);
        }

        .author {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.7);
            font-style: italic;
            margin-top: 15px;
        }

        .season-badge {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-size: 0.85rem;
            color: #fff;
            margin-top: 25px;
            letter-spacing: 1px;
        }

        .clock {
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            z-index: 100;
            font-weight: 500;
        }

        .refresh-hint {
            position: fixed;
            bottom: 30px;
            left: 30px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            z-index: 100;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .greeting {
                font-size: 1.8rem;
            }
            .message {
                font-size: 1.1rem;
            }
            .greeting-card {
                padding: 35px 25px;
                margin: 15px;
            }
            .time-icon {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="animation-canvas"></canvas>
    
    <div class="container">
        <div class="greeting-card">
            <div class="time-icon" id="timeIcon">🌅</div>
            <h1 class="greeting" id="greeting">Good Morning!</h1>
            <p class="time-label" id="timeLabel">A fresh start awaits</p>
            <div class="divider"></div>
            <p class="message" id="message">Loading your daily dose of sunshine...</p>
            <p class="author" id="author"></p>
            <span class="season-badge" id="seasonBadge">🌸 Spring</span>
        </div>
    </div>

    <div class="clock" id="clock"></div>
    <div class="refresh-hint">↻ Refresh for a new message</div>

    <script>
        // Heartfelt messages collection - real, warm, and motivating
        const messages = {
            morning: [
                { text: "The world is still waking up, and so are your possibilities. Today is unwritten — make it a story worth telling.", author: "" },
                { text: "You didn't come this far to only come this far. This morning is proof that you get another chance.", author: "" },
                { text: "Somewhere, someone is hoping to meet a person exactly like you today. Be that bright spot in their day.", author: "" },
                { text: "The sunrise doesn't care about yesterday's clouds. Neither should you. Fresh light, fresh start.", author: "" },
                { text: "Coffee is ready, the day is young, and you? You're capable of more than you remember.", author: "" },
                { text: "Every expert was once a beginner on a morning just like this one. Your journey is valid.", author: "" },
                { text: "The birds don't sing because they have answers. They sing because they have a song. What's yours today?", author: "" },
                { text: "You woke up with a 100% track record of surviving difficult days. That's not luck — that's you.", author: "" },
                { text: "This morning chose you. Out of all the possible versions of today, you get to shape this one.", author: "" },
                { text: "Small steps still move you forward. Big dreams still need someone to believe in them. Why not you?", author: "" }
            ],
            forenoon: [
                { text: "The day is gaining momentum, and so are you. Don't underestimate what quiet consistency builds.", author: "" },
                { text: "You're in the middle of your story, not the end. Plot twists are still possible.", author: "" },
                { text: "That thing you're procrastinating? It's scared of you too. You're braver than your hesitation.", author: "" },
                { text: "Progress isn't always visible, like roots growing underground. Trust what you're building.", author: "" },
                { text: "Someone out there is inspired by how you handle things. You don't even know it yet.", author: "" },
                { text: "The best ideas often arrive when we're not chasing them. Stay open, stay curious.", author: "" },
                { text: "You've already done hard things before. This is just another one for the collection.", author: "" },
                { text: "Doubt kills more dreams than failure ever will. Keep moving, even if it's slowly.", author: "" },
                { text: "The sun doesn't rush to reach its peak. It just keeps rising. There's wisdom in that.", author: "" },
                { text: "Your potential isn't a fixed point — it expands every time you try something new.", author: "" }
            ],
            afternoon: [
                { text: "Halfway through the day and still standing? That's not nothing. That's everything.", author: "" },
                { text: "The afternoon slump is just your mind asking for a kind thought. Here's one: you're doing okay.", author: "" },
                { text: "Rest if you must, but don't quit. The second half of the day still has surprises.", author: "" },
                { text: "You've handled 100% of your worst days so far. Your track record is actually perfect.", author: "" },
                { text: "Somewhere, the you from five years ago would be amazed at where you are now. Give yourself credit.", author: "" },
                { text: "Not every day needs to be productive. Sometimes showing up is the whole victory.", author: "" },
                { text: "The world didn't stop needing your light just because it's past noon. Shine anyway.", author: "" },
                { text: "Tired doesn't mean weak. It means you've been trying. That matters.", author: "" },
                { text: "Afternoons are for second winds. Take a breath — yours might be coming any moment now.", author: "" },
                { text: "Your energy is a gift you choose where to spend. Choose yourself sometimes too.", author: "" }
            ],
            evening: [
                { text: "The sky puts on its best colors at the end of the day. Maybe you're saving your best too.", author: "" },
                { text: "Whatever today was — messy, magical, or somewhere between — you made it through. Respect that.", author: "" },
                { text: "Evenings are for releasing what didn't serve you. Exhale. Let it go.", author: "" },
                { text: "You don't have to have it all figured out by sunset. Just figured out enough for today.", author: "" },
                { text: "The best conversations happen when the day softens. Be gentle with yourself tonight.", author: "" },
                { text: "Today's worries will look smaller by morning light. For now, just rest in the in-between.", author: "" },
                { text: "Every ending is secretly a beginning in disguise. Tomorrow is already on its way.", author: "" },
                { text: "You did things today that mattered, even if they felt small. Especially if they felt small.", author: "" },
                { text: "The evening doesn't judge what the morning hoped for. It just holds space for rest.", author: "" },
                { text: "Sunsets are proof that endings can be beautiful too. Yours will be, in time.", author: "" }
            ],
            night: [
                { text: "The stars don't compete with each other. They just shine. So can you.", author: "" },
                { text: "Night is when the universe reminds us how vast possibility really is. Dream accordingly.", author: "" },
                { text: "You've made it to another night. That's not just surviving — that's a quiet kind of winning.", author: "" },
                { text: "Sleep is the body's way of saying 'let me handle the rest.' Trust it tonight.", author: "" },
                { text: "The darkness doesn't diminish the light you carry. It just makes it more visible.", author: "" },
                { text: "Tonight's rest is tomorrow's strength. You're not doing nothing — you're preparing for everything.", author: "" },
                { text: "Even the moon takes time to recharge. Phases aren't failures. They're part of the design.", author: "" },
                { text: "The night sky held its shape for billions of years, waiting for you to see it. You're part of something ancient and infinite.", author: "" },
                { text: "Let go of today. It did its job. Tomorrow is already lining up beautiful things for you.", author: "" },
                { text: "The world gets quiet at night so you can finally hear your own heart. What's it saying?", author: "" }
            ],
            // Season-specific additions
            summer: [
                { text: "Summer reminds us that warmth exists — in the sun, in laughter, in you.", author: "" },
                { text: "Long days mean more chances to find joy. It's hiding in small places. Go looking.", author: "" },
                { text: "The sun takes its time setting in summer, like it's savoring the day. Savor yours too.", author: "" }
            ],
            winter: [
                { text: "Winter teaches us that stillness isn't emptiness — it's preparation for bloom.", author: "" },
                { text: "Even in the cold, there's warmth to be found. Sometimes it's a cup of tea. Sometimes it's a kind thought.", author: "" },
                { text: "The trees aren't dead in winter. They're resting. Maybe that's what you need too.", author: "" }
            ],
            monsoon: [
                { text: "Rain doesn't ask permission to nourish the earth. Be unapologetic about growing too.", author: "" },
                { text: "After the storm, the air is always clearer. Trust what's being washed away.", author: "" },
                { text: "Petrichor — the smell of rain on dry earth — is one of nature's most honest gifts. Breathe it in.", author: "" }
            ]
        };

        // Time and season configurations
        const timeConfig = {
            morning: { icon: "🌅", greeting: "Good Morning!", label: "A fresh start awaits", hours: [5, 6, 7, 8, 9] },
            forenoon: { icon: "☀️", greeting: "Good Day!", label: "The day is unfolding beautifully", hours: [10, 11] },
            afternoon: { icon: "🌤️", greeting: "Good Afternoon!", label: "Keep shining bright", hours: [12, 13, 14, 15, 16] },
            evening: { icon: "🌇", greeting: "Good Evening!", label: "Time to unwind", hours: [17, 18, 19, 20] },
            night: { icon: "🌙", greeting: "Good Night!", label: "Rest well, dream big", hours: [21, 22, 23, 0, 1, 2, 3, 4] }
        };

        const seasonConfig = {
            summer: { icon: "☀️", label: "Summer Vibes", months: [4, 5, 6] },
            monsoon: { icon: "🌧️", label: "Monsoon Magic", months: [7, 8, 9] },
            autumn: { icon: "🍂", label: "Autumn Breeze", months: [10, 11] },
            winter: { icon: "❄️", label: "Winter Wonder", months: [12, 1, 2] },
            spring: { icon: "🌸", label: "Spring Bloom", months: [3] }
        };

        // Determine current time period
        function getTimePeriod() {
            const hour = new Date().getHours();
            for (const [period, config] of Object.entries(timeConfig)) {
                if (config.hours.includes(hour)) return period;
            }
            return 'morning';
        }

        // Determine current season (Northern Hemisphere default, adjust as needed)
        function getSeason() {
            const month = new Date().getMonth() + 1;
            for (const [season, config] of Object.entries(seasonConfig)) {
                if (config.months.includes(month)) return season;
            }
            return 'spring';
        }

        // Get a random message
        function getMessage(timePeriod, season) {
            const timeMessages = messages[timePeriod] || messages.morning;
            const seasonMessages = messages[season] || [];
            
            // 70% chance time-based, 30% chance season-based (if available)
            const useSeasonMessage = seasonMessages.length > 0 && Math.random() < 0.3;
            const pool = useSeasonMessage ? seasonMessages : timeMessages;
            
            return pool[Math.floor(Math.random() * pool.length)];
        }

        // Update clock
        function updateClock() {
            const now = new Date();
            const options = { hour: '2-digit', minute: '2-digit', weekday: 'long', month: 'short', day: 'numeric' };
            document.getElementById('clock').textContent = now.toLocaleDateString('en-US', options) + ' • ' + now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        // Animation system
        class ParticleSystem {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.particles = [];
                this.resize();
                window.addEventListener('resize', () => this.resize());
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            clear() {
                this.particles = [];
            }

            // Stars for night
            createStars(count = 100) {
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        type: 'star',
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        size: Math.random() * 2 + 1,
                        twinkleSpeed: Math.random() * 0.02 + 0.01,
                        opacity: Math.random()
                    });
                }
            }

            // Falling stars for night
            createFallingStars(count = 5) {
                for (let i = 0; i < count; i++) {
                    this.addFallingStar();
                }
            }

            addFallingStar() {
                this.particles.push({
                    type: 'fallingStar',
                    x: Math.random() * this.canvas.width,
                    y: -10,
                    length: Math.random() * 80 + 40,
                    speed: Math.random() * 8 + 4,
                    angle: Math.PI / 4 + (Math.random() - 0.5) * 0.3,
                    opacity: 1
                });
            }

            // Sun rays for morning/afternoon
            createSunRays(count = 8) {
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        type: 'sunRay',
                        angle: (i / count) * Math.PI * 2,
                        length: Math.random() * 100 + 150,
                        opacity: Math.random() * 0.3 + 0.1,
                        pulseSpeed: Math.random() * 0.02 + 0.01
                    });
                }
            }

            // Floating leaves for forenoon
            createLeaves(count = 15) {
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        type: 'leaf',
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        size: Math.random() * 15 + 10,
                        rotation: Math.random() * Math.PI * 2,
                        rotationSpeed: (Math.random() - 0.5) * 0.02,
                        speedX: Math.random() * 1 - 0.5,
                        speedY: Math.random() * 0.5 + 0.2,
                        color: ['#90EE90', '#98FB98', '#00FA9A', '#7CFC00'][Math.floor(Math.random() * 4)]
                    });
                }
            }

            // Fireflies for evening
            createFireflies(count = 30) {
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        type: 'firefly',
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        size: Math.random() * 4 + 2,
                        speedX: (Math.random() - 0.5) * 2,
                        speedY: (Math.random() - 0.5) * 2,
                        glowPhase: Math.random() * Math.PI * 2,
                        glowSpeed: Math.random() * 0.05 + 0.02
                    });
                }
            }

            // Rain drops for monsoon
            createRain(count = 100) {
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        type: 'rain',
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        length: Math.random() * 20 + 10,
                        speed: Math.random() * 15 + 10,
                        opacity: Math.random() * 0.5 + 0.3
                    });
                }
            }

            // Snowflakes for winter
            createSnow(count = 80) {
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        type: 'snow',
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        size: Math.random() * 4 + 2,
                        speedY: Math.random() * 1 + 0.5,
                        speedX: Math.random() * 0.5 - 0.25,
                        wobble: Math.random() * Math.PI * 2,
                        wobbleSpeed: Math.random() * 0.02 + 0.01
                    });
                }
            }

            // Floating clouds
            createClouds(count = 5) {
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        type: 'cloud',
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * (this.canvas.height * 0.4),
                        width: Math.random() * 150 + 100,
                        height: Math.random() * 50 + 30,
                        speed: Math.random() * 0.3 + 0.1,
                        opacity: Math.random() * 0.3 + 0.1
                    });
                }
            }

            update() {
                this.particles.forEach((p, index) => {
                    switch (p.type) {
                        case 'star':
                            p.opacity = 0.5 + Math.sin(Date.now() * p.twinkleSpeed) * 0.5;
                            break;
                        case 'fallingStar':
                            p.x += Math.cos(p.angle) * p.speed;
                            p.y += Math.sin(p.angle) * p.speed;
                            p.opacity -= 0.01;
                            if (p.y > this.canvas.height || p.opacity <= 0) {
                                this.particles[index] = null;
                                if (Math.random() < 0.02) this.addFallingStar();
                            }
                            break;
                        case 'sunRay':
                            p.opacity = 0.15 + Math.sin(Date.now() * p.pulseSpeed) * 0.1;
                            break;
                        case 'leaf':
                            p.x += p.speedX + Math.sin(Date.now() * 0.001 + p.rotation) * 0.5;
                            p.y += p.speedY;
                            p.rotation += p.rotationSpeed;
                            if (p.y > this.canvas.height + 20) {
                                p.y = -20;
                                p.x = Math.random() * this.canvas.width;
                            }
                            break;
                        case 'firefly':
                            p.x += p.speedX + Math.sin(Date.now() * 0.002) * 0.5;
                            p.y += p.speedY + Math.cos(Date.now() * 0.002) * 0.5;
                            p.glowPhase += p.glowSpeed;
                            if (p.x < 0) p.x = this.canvas.width;
                            if (p.x > this.canvas.width) p.x = 0;
                            if (p.y < 0) p.y = this.canvas.height;
                            if (p.y > this.canvas.height) p.y = 0;
                            break;
                        case 'rain':
                            p.y += p.speed;
                            p.x -= 2;
                            if (p.y > this.canvas.height) {
                                p.y = -20;
                                p.x = Math.random() * this.canvas.width;
                            }
                            break;
                        case 'snow':
                            p.wobble += p.wobbleSpeed;
                            p.x += p.speedX + Math.sin(p.wobble) * 0.5;
                            p.y += p.speedY;
                            if (p.y > this.canvas.height) {
                                p.y = -10;
                                p.x = Math.random() * this.canvas.width;
                            }
                            break;
                        case 'cloud':
                            p.x += p.speed;
                            if (p.x > this.canvas.width + p.width) {
                                p.x = -p.width;
                            }
                            break;
                    }
                });
                this.particles = this.particles.filter(p => p !== null);
            }

            draw() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                this.particles.forEach(p => {
                    switch (p.type) {
                        case 'star':
                            this.ctx.beginPath();
                            this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                            this.ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                            this.ctx.fill();
                            break;
                        case 'fallingStar':
                            const gradient = this.ctx.createLinearGradient(
                                p.x, p.y,
                                p.x - Math.cos(p.angle) * p.length,
                                p.y - Math.sin(p.angle) * p.length
                            );
                            gradient.addColorStop(0, `rgba(255, 255, 255, ${p.opacity})`);
                            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                            this.ctx.beginPath();
                            this.ctx.moveTo(p.x, p.y);
                            this.ctx.lineTo(
                                p.x - Math.cos(p.angle) * p.length,
                                p.y - Math.sin(p.angle) * p.length
                            );
                            this.ctx.strokeStyle = gradient;
                            this.ctx.lineWidth = 2;
                            this.ctx.stroke();
                            this.ctx.beginPath();
                            this.ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                            this.ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                            this.ctx.fill();
                            break;
                        case 'sunRay':
                            const centerX = this.canvas.width * 0.85;
                            const centerY = this.canvas.height * 0.15;
                            const rayGradient = this.ctx.createLinearGradient(
                                centerX, centerY,
                                centerX + Math.cos(p.angle) * p.length,
                                centerY + Math.sin(p.angle) * p.length
                            );
                            rayGradient.addColorStop(0, `rgba(255, 255, 200, ${p.opacity})`);
                            rayGradient.addColorStop(1, 'rgba(255, 255, 200, 0)');
                            this.ctx.beginPath();
                            this.ctx.moveTo(centerX, centerY);
                            this.ctx.lineTo(
                                centerX + Math.cos(p.angle) * p.length,
                                centerY + Math.sin(p.angle) * p.length
                            );
                            this.ctx.strokeStyle = rayGradient;
                            this.ctx.lineWidth = 30;
                            this.ctx.stroke();
                            break;
                        case 'leaf':
                            this.ctx.save();
                            this.ctx.translate(p.x, p.y);
                            this.ctx.rotate(p.rotation);
                            this.ctx.beginPath();
                            this.ctx.ellipse(0, 0, p.size, p.size / 2, 0, 0, Math.PI * 2);
                            this.ctx.fillStyle = p.color;
                            this.ctx.globalAlpha = 0.7;
                            this.ctx.fill();
                            this.ctx.restore();
                            break;
                        case 'firefly':
                            const glow = (Math.sin(p.glowPhase) + 1) / 2;
                            const fireflyGradient = this.ctx.createRadialGradient(
                                p.x, p.y, 0,
                                p.x, p.y, p.size * 3
                            );
                            fireflyGradient.addColorStop(0, `rgba(255, 255, 150, ${glow})`);
                            fireflyGradient.addColorStop(0.5, `rgba(255, 255, 100, ${glow * 0.5})`);
                            fireflyGradient.addColorStop(1, 'rgba(255, 255, 100, 0)');
                            this.ctx.beginPath();
                            this.ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
                            this.ctx.fillStyle = fireflyGradient;
                            this.ctx.fill();
                            break;
                        case 'rain':
                            this.ctx.beginPath();
                            this.ctx.moveTo(p.x, p.y);
                            this.ctx.lineTo(p.x - 5, p.y + p.length);
                            this.ctx.strokeStyle = `rgba(200, 220, 255, ${p.opacity})`;
                            this.ctx.lineWidth = 1;
                            this.ctx.stroke();
                            break;
                        case 'snow':
                            this.ctx.beginPath();
                            this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                            this.ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                            this.ctx.fill();
                            break;
                        case 'cloud':
                            this.ctx.beginPath();
                            this.ctx.ellipse(p.x, p.y, p.width / 2, p.height / 2, 0, 0, Math.PI * 2);
                            this.ctx.ellipse(p.x - p.width * 0.3, p.y + 10, p.width / 3, p.height / 2.5, 0, 0, Math.PI * 2);
                            this.ctx.ellipse(p.x + p.width * 0.3, p.y + 5, p.width / 3, p.height / 2.5, 0, 0, Math.PI * 2);
                            this.ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                            this.ctx.fill();
                            break;
                    }
                });
            }

            animate() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.animate());
            }
        }

        // Initialize everything
        function init() {
            const timePeriod = getTimePeriod();
            const season = getSeason();
            const config = timeConfig[timePeriod];
            const seasonCfg = seasonConfig[season];
            const message = getMessage(timePeriod, season);

            // Update UI
            document.getElementById('timeIcon').textContent = config.icon;
            document.getElementById('greeting').textContent = config.greeting;
            document.getElementById('timeLabel').textContent = config.label;
            document.getElementById('message').textContent = message.text;
            document.getElementById('author').textContent = message.author ? `— ${message.author}` : '';
            document.getElementById('seasonBadge').textContent = `${seasonCfg.icon} ${seasonCfg.label}`;

            // Set background class
            document.body.className = `${timePeriod} ${season}`;

            // Initialize particle system
            const canvas = document.getElementById('animation-canvas');
            const particles = new ParticleSystem(canvas);

            // Add appropriate animations based on time and season
            switch (timePeriod) {
                case 'night':
                    particles.createStars(120);
                    particles.createFallingStars(3);
                    break;
                case 'morning':
                    particles.createSunRays(10);
                    particles.createClouds(4);
                    break;
                case 'forenoon':
                    particles.createLeaves(20);
                    particles.createClouds(3);
                    break;
                case 'afternoon':
                    particles.createSunRays(12);
                    particles.createClouds(5);
                    break;
                case 'evening':
                    particles.createFireflies(40);
                    break;
            }

            // Add season-specific effects
            if (season === 'winter') {
                particles.createSnow(100);
            } else if (season === 'monsoon') {
                particles.createRain(150);
            }

            particles.animate();

            // Start clock
            updateClock();
            setInterval(updateClock, 1000);
        }

        // Run on load
        window.addEventListener('load', init);
    </script>
